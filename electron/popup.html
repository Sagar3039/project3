<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bob</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: rgba(15, 17, 21, 0.95);
      color: #e0e0e0;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      -webkit-app-region: drag;
    }

    #input-area {
      display: flex;
      align-items: center;
      padding: 14px 18px;
      gap: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      -webkit-app-region: no-drag;
    }

    #input-area .icon {
      font-size: 18px;
      opacity: 0.5;
      flex-shrink: 0;
    }

    #query {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-size: 16px;
      font-family: inherit;
      caret-color: #6c8cff;
    }

    #query::placeholder {
      color: rgba(255,255,255,0.3);
    }

    #response-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px 18px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-wrap: break-word;
      -webkit-app-region: no-drag;
    }

    #response-area::-webkit-scrollbar {
      width: 4px;
    }

    #response-area::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.15);
      border-radius: 4px;
    }

    #response-area .placeholder {
      color: rgba(255,255,255,0.25);
      font-style: italic;
    }

    #response-area .error {
      color: #ff6b6b;
    }

    #response-area .cursor {
      display: inline-block;
      width: 2px;
      height: 14px;
      background: #6c8cff;
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.8s infinite;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    #footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 18px;
      border-top: 1px solid rgba(255,255,255,0.06);
      font-size: 11px;
      color: rgba(255,255,255,0.25);
      -webkit-app-region: no-drag;
    }

    #footer kbd {
      background: rgba(255,255,255,0.08);
      padding: 2px 6px;
      border-radius: 3px;
      font-family: inherit;
      font-size: 10px;
    }

    #voice-toggle {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.4);
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 11px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }

    #voice-toggle:hover {
      background: rgba(255,255,255,0.1);
    }

    #voice-toggle.on {
      color: #6c8cff;
      border-color: rgba(108,140,255,0.3);
      background: rgba(108,140,255,0.1);
    }
  </style>
</head>
<body>
  <div id="input-area">
    <span class="icon">&#9906;</span>
    <input id="query" type="text" placeholder="Ask Bob anything..." autofocus />
  </div>
  <div id="response-area">
    <span class="placeholder">Type a question and press Enter</span>
  </div>
  <div id="footer">
    <span><kbd>Enter</kbd> send &nbsp; <kbd>Esc</kbd> close</span>
    <span style="display:flex;align-items:center;gap:8px;">
      <button id="voice-toggle" title="Toggle voice">Voice Off</button>
      <span id="model-label"></span>
    </span>
  </div>
  <script src="popup.js"></script>
</body>
</html>
